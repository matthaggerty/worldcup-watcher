<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="floodGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#dff5ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#dff5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pitchGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccff00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ccff00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="#04070a"/>

  <!-- Stadium roof / seating bowl silhouette -->
  <path d="M380 320 C 480 120, 760 80, 800 110 L 800 0 L 380 0 Z" fill="#0d1a26"/>
  <path d="M420 340 C 520 160, 760 130, 800 160 L 800 0 L 420 0 Z" fill="#13202e"/>

  <!-- Seating texture dots -->
  <g fill="#2a3d4f" opacity="0.6">
    <circle cx="520" cy="90" r="2"/><circle cx="540" cy="85" r="2"/><circle cx="560" cy="82" r="2"/>
    <circle cx="580" cy="80" r="2"/><circle cx="600" cy="79" r="2"/><circle cx="620" cy="80" r="2"/>
    <circle cx="640" cy="83" r="2"/><circle cx="660" cy="88" r="2"/><circle cx="680" cy="95" r="2"/>
    <circle cx="700" cy="104" r="2"/><circle cx="720" cy="115" r="2"/><circle cx="740" cy="128" r="2"/>
    <circle cx="760" cy="143" r="2"/><circle cx="780" cy="160" r="2"/>
    <circle cx="540" cy="115" r="2"/><circle cx="565" cy="108" r="2"/><circle cx="590" cy="103" r="2"/>
    <circle cx="615" cy="101" r="2"/><circle cx="640" cy="103" r="2"/><circle cx="665" cy="108" r="2"/>
    <circle cx="690" cy="117" r="2"/><circle cx="715" cy="129" r="2"/><circle cx="740" cy="144" r="2"/>
    <circle cx="765" cy="162" r="2"/><circle cx="790" cy="183" r="2"/>
  </g>

  <!-- Floodlight masts -->
  <g stroke="#1c2c3a" stroke-width="4">
    <line x1="660" y1="180" x2="640" y2="40"/>
    <line x1="760" y1="200" x2="780" y2="60"/>
  </g>

  <!-- Floodlight heads -->
  <g fill="#3a4f63">
    <rect x="590" y="20" width="100" height="34" rx="3"/>
    <rect x="730" y="40" width="100" height="34" rx="3"/>
  </g>
  <g fill="#cfe9ff">
    <circle cx="605" cy="29" r="3"/><circle cx="620" cy="29" r="3"/><circle cx="635" cy="29" r="3"/><circle cx="650" cy="29" r="3"/><circle cx="665" cy="29" r="3"/><circle cx="680" cy="29" r="3"/>
    <circle cx="605" cy="44" r="3"/><circle cx="620" cy="44" r="3"/><circle cx="635" cy="44" r="3"/><circle cx="650" cy="44" r="3"/><circle cx="665" cy="44" r="3"/><circle cx="680" cy="44" r="3"/>
    <circle cx="745" cy="49" r="3"/><circle cx="760" cy="49" r="3"/><circle cx="775" cy="49" r="3"/><circle cx="790" cy="49" r="3"/><circle cx="805" cy="49" r="3"/><circle cx="820" cy="49" r="3"/>
    <circle cx="745" cy="64" r="3"/><circle cx="760" cy="64" r="3"/><circle cx="775" cy="64" r="3"/><circle cx="790" cy="64" r="3"/><circle cx="805" cy="64" r="3"/><circle cx="820" cy="64" r="3"/>
  </g>

  <!-- Floodlight glow -->
  <circle cx="640" cy="40" r="160" fill="url(#floodGlow)"/>
  <circle cx="780" cy="60" r="160" fill="url(#floodGlow)"/>

  <!-- Pitch -->
  <rect x="280" y="400" width="520" height="120" fill="#0b1f10"/>
  <path d="M280 520 L 800 380 L 800 520 Z" fill="url(#pitchGlow)"/>

  <!-- Pitch lines -->
  <g stroke="#9affd6" stroke-opacity="0.35" stroke-width="2" fill="none">
    <path d="M300 470 L 800 360"/>
    <path d="M340 500 L 800 400"/>
    <ellipse cx="650" cy="430" rx="70" ry="22" transform="rotate(-12 650 430)"/>
  </g>

  <!-- Fade to black on the left so it blends with header background -->
  <rect width="800" height="520" fill="url(#fadeLeft)"/>
</svg>
